<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #151520;
            --text-primary: #f5f5f7;
            --text-secondary: #8b8b8f;
            --accent: #ff6b35;
            --accent-glow: rgba(255, 107, 53, 0.3);
            --card-bg: #1a1a24;
            --card-hover: #222230;
            --border: #2a2a35;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Ambient background effect */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(255, 107, 53, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(107, 35, 255, 0.05) 0%, transparent 40%);
            z-index: -1;
            animation: ambientMove 20s ease-in-out infinite;
        }

        @keyframes ambientMove {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-2%, -2%); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 40px;
        }

        /* Header */
        header {
            margin-bottom: 100px;
            animation: fadeInUp 1s ease-out;
        }

        h1 {
            font-family: 'Crimson Pro', serif;
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 300;
            letter-spacing: -0.02em;
            margin-bottom: 24px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: var(--text-secondary);
            max-width: 600px;
            font-weight: 400;
            letter-spacing: 0.01em;
        }

        /* Layout with sidebar */
        .layout {
            display: flex;
            gap: 60px;
            align-items: flex-start;
        }

        /* Sidebar Navigation */
        .sidebar {
            position: sticky;
            top: 40px;
            width: 240px;
            flex-shrink: 0;
            animation: fadeInUp 1s ease-out 0.1s backwards;
        }

        .sidebar-title {
            font-family: 'Crimson Pro', serif;
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 24px;
            opacity: 0.6;
        }

        .sidebar-nav {
            list-style: none;
        }

        .sidebar-item {
            margin-bottom: 12px;
        }

        .sidebar-link {
            display: block;
            padding: 12px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9375rem;
            border-radius: 12px;
            transition: all 0.3s ease;
            border-left: 2px solid transparent;
        }

        .sidebar-link:hover {
            color: var(--text-primary);
            background: rgba(255, 107, 53, 0.05);
            border-left-color: var(--accent);
        }

        .sidebar-link.active {
            color: var(--accent);
            background: rgba(255, 107, 53, 0.1);
            border-left-color: var(--accent);
        }

        /* Main content */
        .main-content {
            flex: 1;
            min-width: 0;
        }

        /* Projects Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 80px;
        }

        .project-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            animation: fadeInUp 1s ease-out backwards;
        }

        .project-card:nth-child(1) { animation-delay: 0.2s; }
        .project-card:nth-child(2) { animation-delay: 0.3s; }
        .project-card:nth-child(3) { animation-delay: 0.4s; }
        .project-card:nth-child(4) { animation-delay: 0.5s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), rgba(255, 107, 53, 0));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .project-card:hover::before {
            transform: scaleX(1);
        }

        .project-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
                        var(--accent-glow) 0%,
                        transparent 60%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .project-card:hover::after {
            opacity: 1;
        }

        .project-card:hover {
            background: var(--card-hover);
            border-color: var(--accent);
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4),
                        0 0 40px var(--accent-glow);
        }

        .project-number {
            font-family: 'Crimson Pro', serif;
            font-size: 0.875rem;
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 0.1em;
            margin-bottom: 16px;
            opacity: 0.8;
        }

        .project-title {
            font-family: 'Crimson Pro', serif;
            font-size: clamp(1.75rem, 4vw, 2.25rem);
            font-weight: 400;
            margin-bottom: 16px;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .project-description {
            font-size: 0.9375rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 32px;
        }

        .project-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
            font-weight: 500;
            font-size: 0.9375rem;
            transition: gap 0.3s ease;
        }

        .project-link svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }

        .project-card:hover .project-link {
            gap: 12px;
        }

        .project-card:hover .project-link svg {
            transform: translateX(4px);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 0;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.875rem;
            animation: fadeInUp 1s ease-out 0.6s backwards;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.3s ease;
        }

        footer a:hover {
            opacity: 0.8;
        }

        /* Responsive */
        @media (max-width: 968px) {
            .layout {
                flex-direction: column;
                gap: 40px;
            }

            .sidebar {
                position: relative;
                top: 0;
                width: 100%;
            }

            .sidebar-nav {
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
            }

            .sidebar-item {
                margin-bottom: 0;
            }

            .sidebar-link {
                padding: 10px 16px;
                border-left: none;
                border-bottom: 2px solid transparent;
            }

            .sidebar-link:hover,
            .sidebar-link.active {
                border-left-color: transparent;
                border-bottom-color: var(--accent);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 60px 24px;
            }

            header {
                margin-bottom: 60px;
            }

            .projects-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .project-card {
                padding: 24px;
            }
        }

        /* Smooth scrolling */
        @media (prefers-reduced-motion: no-preference) {
            html {
                scroll-behavior: smooth;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Gallery</h1>
        </header>

        <div class="layout">
            <!-- Sidebar Navigation -->
            <aside class="sidebar">
                <div class="sidebar-title">项目目录</div>
                <nav>
                    <ul class="sidebar-nav">
                        <li class="sidebar-item">
                            <a href="underwater-3d.html" class="sidebar-link">
                                underwater-3d
                            </a>
                        </li>
                        <li class="sidebar-item">
                            <a href="flow-not-rules.html" class="sidebar-link">
                                flow-not-rules
                            </a>
                        </li>
                    </ul>
                </nav>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <div class="projects-grid">
                    <!-- Project 1 -->
                    <a href="underwater-3d.html" class="project-card">
                        <div class="project-number">01</div>
                        <h2 class="project-title">Project: underwater-3d</h2>
                        <div class="project-link">
                            查看项目
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
                            </svg>
                        </div>
                    </a>

                    <!-- Project 2 -->
                    <a href="flow-not-rules.html" class="project-card">
                        <div class="project-number">02</div>
                        <h2 class="project-title">Project: flow-not-rules</h2>
                        <div class="project-link">
                            查看项目
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
                            </svg>
                        </div>
                    </a>

                    <!-- Add more project cards here as needed -->
                </div>

                <footer>
                    <p>由 <a href="https://github.com/jeekeagle" target="_blank">@jeekeagle</a> 设计与开发</p>
                    <div style="margin-top: 16px;">
                        <a href="https://www.netlify.com" target="_blank" rel="noopener noreferrer">
                            <img src="https://www.netlify.com/img/global/badges/netlify-color-accent.svg"
                                 alt="Deploys by Netlify"
                                 style="height: 32px; width: auto;">
                        </a>
                    </div>
                </footer>
            </main>
        </div>
    </div>

    <script>
        // Track mouse position for glow effect
        document.querySelectorAll('.project-card').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                card.style.setProperty('--mouse-x', `${x}%`);
                card.style.setProperty('--mouse-y', `${y}%`);
            });
        });

        // Smooth reveal on scroll
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, observerOptions);

        document.querySelectorAll('.project-card').forEach(card => {
            observer.observe(card);
        });

        // Highlight active sidebar link based on current page
        const currentPath = window.location.pathname.split('/').pop();
        document.querySelectorAll('.sidebar-link').forEach(link => {
            const href = link.getAttribute('href');
            if (href === currentPath) {
                link.classList.add('active');
            }
        });
    </script>
</body>
</html>
