<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery — Liquid Glass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08080c;
            --fg: #f0f0f5;
            --muted: #6b6b80;
            --accent: #00f5d4;
            --accent-secondary: #7b61ff;
            --card-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);
            --sidebar-width: 260px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Geist', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated gradient mesh background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% 40%, rgba(0, 245, 212, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse 60% 80% at 80% 60%, rgba(123, 97, 255, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse 50% 50% at 50% 100%, rgba(255, 107, 53, 0.08) 0%, transparent 40%);
            animation: meshMove 15s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes meshMove {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(2deg); }
        }

        /* Layout */
        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: var(--sidebar-width);
            height: 100vh;
            padding: 40px 24px;
            background: rgba(8, 8, 12, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header {
            margin-bottom: 40px;
        }

        .logo {
            font-family: 'Instrument Serif', serif;
            font-size: 1.75rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            color: var(--fg);
            font-style: italic;
        }

        .logo-accent {
            color: var(--accent);
        }

        .sidebar-nav {
            flex: 1;
        }

        .nav-section {
            margin-bottom: 32px;
        }

        .nav-section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--muted);
            margin-bottom: 16px;
            padding-left: 12px;
        }

        .nav-list {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 4px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 0;
            background: var(--accent);
            border-radius: 0 2px 2px 0;
            transition: height 0.3s ease;
        }

        .nav-link:hover {
            color: var(--fg);
            background: var(--card-glass);
        }

        .nav-link:hover::before {
            height: 20px;
        }

        .nav-link.active {
            color: var(--accent);
            background: rgba(0, 245, 212, 0.05);
        }

        .nav-link.active::before {
            height: 20px;
        }

        .nav-icon {
            width: 18px;
            height: 18px;
            opacity: 0.7;
        }

        .sidebar-footer {
            padding-top: 24px;
            border-top: 1px solid var(--border-glass);
        }

        .sidebar-footer a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.3s ease;
        }

        .sidebar-footer a:hover {
            color: var(--accent);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 60px 50px;
        }

        /* Header */
        .page-header {
            margin-bottom: 50px;
        }

        .page-title {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 400;
            letter-spacing: -0.03em;
            line-height: 1.1;
            background: linear-gradient(135deg, var(--fg) 0%, var(--muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-tagline {
            font-size: 0.95rem;
            color: var(--muted);
            margin-top: 12px;
            font-weight: 300;
        }

        /* Projects Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        /* Liquid Glass Card - Compact */
        .project-card {
            position: relative;
            padding: 24px 28px;
            background: var(--card-glass);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            text-decoration: none;
            color: inherit;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 80px;
        }

        /* Animated gradient border */
        .project-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(
                135deg,
                var(--accent) 0%,
                var(--accent-secondary) 50%,
                var(--accent) 100%
            );
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .project-card:hover::before {
            opacity: 1;
            animation: borderRotate 3s linear infinite;
        }

        @keyframes borderRotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .project-card:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow:
                0 20px 40px -15px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(0, 245, 212, 0.1);
        }

        .card-content {
            flex: 1;
        }

        .card-number {
            font-family: 'Instrument Serif', serif;
            font-size: 0.65rem;
            color: var(--accent);
            letter-spacing: 0.2em;
            margin-bottom: 6px;
            opacity: 0.8;
        }

        .card-title {
            font-family: 'Instrument Serif', serif;
            font-size: 1.25rem;
            font-weight: 400;
            letter-spacing: -0.01em;
            font-style: italic;
        }

        .card-arrow {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border-glass);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
            flex-shrink: 0;
        }

        .card-arrow svg {
            width: 16px;
            height: 16px;
            stroke: var(--muted);
            transition: all 0.4s ease;
        }

        .project-card:hover .card-arrow {
            border-color: var(--accent);
            background: rgba(0, 245, 212, 0.1);
        }

        .project-card:hover .card-arrow svg {
            stroke: var(--accent);
            transform: translateX(3px);
        }

        /* Footer */
        .page-footer {
            margin-top: 80px;
            padding-top: 30px;
            border-top: 1px solid var(--border-glass);
            text-align: center;
            color: var(--muted);
            font-size: 0.85rem;
        }

        .page-footer a {
            color: var(--accent);
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar {
                width: 220px;
            }
            .main-content {
                margin-left: 220px;
                padding: 40px 30px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .main-content {
                margin-left: 0;
                padding: 30px 20px;
            }
            .projects-grid {
                grid-template-columns: 1fr;
            }
            /* Mobile nav */
            .mobile-nav {
                display: flex;
                gap: 8px;
                margin-bottom: 30px;
                overflow-x: auto;
                padding-bottom: 10px;
            }
            .mobile-nav a {
                padding: 8px 16px;
                background: var(--card-glass);
                border: 1px solid var(--border-glass);
                border-radius: 100px;
                color: var(--muted);
                text-decoration: none;
                font-size: 0.8rem;
                white-space: nowrap;
            }
        }

        @media (min-width: 769px) {
            .mobile-nav {
                display: none;
            }
        }
    </style>
</head>
